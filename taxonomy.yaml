playlist_prefix: "🎧 "
max_playlists_per_track: 2
taxonomy_version: 6
classifier_model: "google/gemini-2.5-flash-lite"

# Each entry becomes a Spotify playlist named "<playlist_prefix><name>".
# The LLM reads these definitions verbatim when classifying each track, so
# write descriptions for the model, not just for yourself.
#
# Keys:
#   name         — short Spotify playlist title (shown in your sidebar)
#   description  — full prose for the LLM; explain vibe, use-case, and edge cases
#   fits         — genre/vibe strings that strongly indicate this playlist
#   audio_hints  — optional numeric guidance the LLM uses alongside Essentia data
#   avoid        — if a track has these qualities, do NOT put it here
#
# Bump taxonomy_version (e.g. 1 → 2) to force re-classification of every cached
# track — useful after restructuring entries or tightening descriptions.

playlists:
  - name: "Deep Focus"
    description: >
      Instrumental or near-wordless music for sustained cognitive work — coding,
      reading, writing. Predictable and low-stimulation. No sudden dynamics,
      no attention-grabbing hooks, no lyrics that pull focus. Feels like
      background water rather than something to listen to. Ambient, lo-fi beats,
      minimal electronic, slow instrumental post-rock all belong here.
    fits:
      - "ambient"
      - "lo-fi"
      - "lo-fi hip-hop"
      - "instrumental post-rock"
      - "minimal techno"
      - "study music"
      - "drone"
      - "neoclassical"
      - "background music"
      - "focus"
      - "instrumental"
    audio_hints:
      tempo: "<100 bpm"
      energy: "low"
      vocal: "low or none"
    avoid:
      - "heavy vocals"
      - "sudden dynamic shifts"
      - "aggressive percussion"
      - "drops"
      - "anthemic"

  - name: "Hyperfocus Loop"
    description: >
      Propulsive, repetitive, hypnotic music that locks you into a task and
      keeps you there. Not relaxing — stimulating but in a controlled,
      tunnel-vision way. Minimal techno with long builds, krautrock motorik
      grooves, driving post-rock without the climax, steady-state electronic.
      Vocals should be absent or heavily processed into texture. The beat
      should feel like it could run forever. Distinct from Deep Focus (which
      is ambient/passive) — this has pulse and forward momentum.
    fits:
      - "minimal techno"
      - "krautrock"
      - "motorik"
      - "post-rock"
      - "industrial techno"
      - "hypnotic techno"
      - "repetitive electronic"
      - "kosmische musik"
      - "driving electronic"
    audio_hints:
      tempo: "110-130 bpm"
      energy: "medium"
      danceability: "medium-high"
      vocal: "none or heavily processed"
    avoid:
      - "heavy lyrical content"
      - "sudden tempo changes"
      - "ballad"
      - "singer-songwriter"

  - name: "Body Doubling"
    description: >
      Gentle music with vocals that creates the feeling of companionable
      presence without demanding attention — like working in a quiet cafe
      where someone is singing softly nearby. Indie folk, lo-fi singer-songwriter,
      bedroom pop, soft acoustic. Lyrics should be present but unobtrusive;
      delivery mellow and conversational rather than theatrical. Mid-tempo,
      low-to-medium energy. The test: does this feel like company?
    fits:
      - "indie folk"
      - "lo-fi"
      - "bedroom pop"
      - "singer-songwriter"
      - "acoustic"
      - "soft rock"
      - "dream pop"
      - "shoegaze"
      - "folk pop"
    audio_hints:
      energy: "low-medium"
      vocal: "present, soft"
      tempo: "70-110 bpm"
    avoid:
      - "aggressive"
      - "metal"
      - "high energy"
      - "screaming"
      - "hip-hop with dense wordplay"

  - name: "Decompression"
    description: >
      For after sensory overload, meltdown recovery, or just needing to
      wind all the way down. Extremely low stimulation — ambient, drone,
      slow electronic pads, soft piano, field recordings. No percussion that
      lands like a blow. No sudden dynamic shifts or unexpected sounds.
      Temporal structure should be slow or absent. Think: lying in a dark
      room with good headphones, letting the tension drain out.
    fits:
      - "ambient"
      - "drone"
      - "dark ambient"
      - "lowercase"
      - "field recording"
      - "ambient classical"
      - "new age"
      - "healing"
      - "meditation"
      - "sleep music"
    audio_hints:
      energy: "very low"
      tempo: "any — structure may be absent"
      vocal: "none or sparse distant texture"
    avoid:
      - "sudden dynamic shifts"
      - "loud distortion"
      - "aggressive percussion"
      - "drops"
      - "loud"
      - "upbeat"
      - "vocals demanding attention"

  - name: "Hype"
    description: >
      High-energy, anthemic music for physical activation — workouts, pre-task
      priming, overcoming inertia. Should feel like it raises the room's energy
      level. Upbeat hip-hop bangers, driving rock anthems, EDM with big drops,
      power metal, hardstyle. Tempo fast, energy high, danceability high.
      Lyrics can be motivational or just energetically delivered — content
      matters less than delivery.
    fits:
      - "upbeat hip-hop"
      - "rap"
      - "rock anthems"
      - "EDM"
      - "hardstyle"
      - "power metal"
      - "punk"
      - "drum and bass"
      - "gym music"
      - "workout"
      - "pop punk"
    audio_hints:
      tempo: ">120 bpm"
      energy: "high"
      danceability: "high"
      mood: "energetic"
    avoid:
      - "slow"
      - "melancholy"
      - "ambient"
      - "ballad"
      - "downtempo"

  - name: "Anger Out"
    description: >
      For processing frustration, anger, or overwhelm in a productive and safe
      way. Music that matches and channels the feeling rather than suppressing
      it. Heavy metal, metalcore, hard rock, aggressive hip-hop, industrial,
      noise rock, screamo. Energy should feel combative or cathartic. Vocals
      can be harsh — screaming, shouting, aggressive rapping all fit.
      This is not the same as Hype (which is fun/motivational) — this is
      specifically about emotional discharge.
    fits:
      - "metal"
      - "metalcore"
      - "deathcore"
      - "heavy metal"
      - "hard rock"
      - "industrial"
      - "noise rock"
      - "screamo"
      - "aggressive hip-hop"
      - "hardcore punk"
      - "grindcore"
      - "nu-metal"
    audio_hints:
      energy: "high"
      mood: "aggressive"
    avoid:
      - "soft"
      - "ambient"
      - "pop"
      - "happy"
      - "uplifting"

  - name: "Melancholy"
    description: >
      Sad, introspective, slow music for processing low moods rather than
      fighting them. The goal is emotional acknowledgement, not cheering up.
      Sad indie rock, slowcore, minimal piano, folk confessionals, sparse
      electronic. Often quiet. Lyrics tend toward loss, longing, isolation.
      Scale often minor. Distinguished from Decompression (which is ambient
      and sensation-free) — Melancholy has emotional content and often vocals.
    fits:
      - "sad indie"
      - "slowcore"
      - "emo"
      - "slow piano"
      - "folk"
      - "singer-songwriter"
      - "dark folk"
      - "post-punk"
      - "dream pop"
      - "rainy day"
    audio_hints:
      tempo: "<90 bpm"
      mood: "sad"
    avoid:
      - "upbeat"
      - "high energy"
      - "dancefloor"
      - "happy"
      - "major key anthems"

  - name: "Joy"
    description: >
      Songs whose dominant emotional message is happiness — exuberant,
      celebratory, or warm. Disco bangers, classic Motown, jubilant gospel,
      anthemic feel-good pop, soundtrack moments built around triumph or
      celebration. Tags like "feel good", "happy", "uplifting", "joyful"
      are strong signals but not strictly required — use the description,
      audio features, and overall vibe together. Major key plus high energy
      plus a celebratory feel is enough. The test: would this fit at a
      genuinely happy moment (a birthday, a reunion, a win)?
    fits:
      - "feel good"
      - "happy"
      - "uplifting"
      - "euphoric"
      - "joyful"
      - "disco"
      - "motown"
      - "anthem"
    audio_hints:
      tempo: "100-140 bpm"
      mood: "happy"
      energy: "medium-high"
    avoid:
      - "ironic or sarcastic lyrics"
      - "predominantly sad or wistful"
      - "predominantly aggressive"
      - "polite background pop with no emotional weight"

  - name: "Nostalgia"
    description: >
      Songs that produce a bittersweet ache for a past time — wistful longing
      mixed with warmth. Strong preference: Last.fm/MusicBrainz tags like
      "nostalgia", "nostalgic", "retro", "throwback", "memories", or
      culturally iconic tracks famously associated with a specific era
      (think movie-soundtrack anthems, defining hits of a decade). Release
      year alone is NOT sufficient — being recorded in 1985 doesn't make a
      song nostalgic, but being THE song people associate with 1985 might.
      If you can't articulate *why* it's nostalgic beyond "it's old", skip it.
    fits:
      - "nostalgia"
      - "nostalgic"
      - "retro"
      - "throwback"
      - "memories"
      - "wistful"
      - "iconic"
    avoid:
      - "current music regardless of style"
      - "old tracks with no cultural memory weight"
      - "aggressive"
      - "avant-garde"

  - name: "Driving"
    description: >
      Music for being in motion — in a car, walking with purpose, commuting.
      Propulsive without being exhausting. Mid-to-high tempo, melodically
      engaging, vocals welcome. Indie rock road-trip feel, alternative with
      momentum, classic rock with groove, hip-hop that bounces. Should feel
      like a good stretch of highway — forward movement without stress.
      Different from Hype (which is about activation/exercise) and Hyperfocus
      Loop (which is more trance-like) — this has hooks and feels cinematic.
    fits:
      - "road trip"
      - "driving"
      - "indie rock"
      - "alternative rock"
      - "classic rock"
      - "hip-hop"
      - "country rock"
      - "heartland rock"
    audio_hints:
      tempo: "95-130 bpm"
      energy: "medium"
    avoid:
      - "ambient"
      - "very slow"
      - "drone"
      - "decompression-style"

  - name: "Cosy"
    description: >
      Warm, soft, low-stakes music for domestic comfort — reading on the
      sofa, making tea, rainy Sunday afternoons. Acoustic guitar, fingerpicked
      folk, gentle jazz, mellow indie, warm lo-fi. Nothing demanding. The
      sonic equivalent of a blanket. Low energy, unhurried tempo, pleasant
      without being cloyingly cheerful. Slightly different from Body Doubling
      (which is about companionable presence for work) — Cosy is purely
      about comfort with no productivity agenda.
    fits:
      - "acoustic"
      - "jazz"
      - "folk"
      - "bossa nova"
      - "lo-fi"
      - "cozy"
      - "warm"
      - "coffeehouse"
      - "mellow"
      - "adult contemporary"
      - "easy listening"
    audio_hints:
      energy: "low-medium"
      tempo: "60-100 bpm"
      vocal: "soft or absent"
    avoid:
      - "aggressive"
      - "loud"
      - "metal"
      - "harsh"
      - "high energy"

  - name: "Curiosity Spark"
    description: >
      Strange, novel, attention-grabbing music for breaking out of a rut or
      rewarding an exploratory mood. Experimental, avant-garde, unusual
      instrumentation, unexpected genre fusions, music that makes you think
      "what IS this?". Math rock, microtonal composition, glitch electronic,
      free jazz, progressive rock with odd time signatures, contemporary
      classical. No tempo or energy constraints — novelty and surprise are
      the only criteria. If a track is weird in an interesting way, it belongs
      here. Last.fm tags like "experimental", "weird", "avant-garde", "strange"
      are strong signals.
    fits:
      - "experimental"
      - "avant-garde"
      - "math rock"
      - "glitch"
      - "microtonal"
      - "free jazz"
      - "contemporary classical"
      - "noise"
      - "progressive rock"
      - "art rock"
      - "post-modern"
      - "weird"
      - "strange"
      - "unusual"
    avoid:
      - "generic pop"
      - "straightforward"
      - "radio-friendly"

  - name: "Swagger"
    description: >
      Hip-hop, R&B, and adjacent music with confident attitude — slick, smooth,
      slightly cocky. The vibe is "I look good and I know it" rather than
      anthemic celebration (Joy) or pure cardio energy (Hype). Trap, drill,
      modern R&B with bravado, smooth rap with attitude. Mid-tempo to upbeat.
      Use-case: getting ready to go out, walking somewhere with purpose,
      hype-without-anthem mood. If a track makes you want to nod with cool
      detachment rather than grin or jump, it probably belongs here.
    fits:
      - "hip-hop"
      - "rap"
      - "trap"
      - "drill"
      - "R&B"
      - "neo-soul"
      - "swag"
      - "confident"
      - "cool"
    audio_hints:
      tempo: "70-130 bpm"
      energy: "medium-high"
      mood: "confident"
    avoid:
      - "anthemic celebration"
      - "predominantly sad"
      - "pure aggression without style"

  - name: "Dreamy"
    description: >
      Hazy, floating, slightly disorienting in a pleasant way. Psychedelic
      rock, shoegaze, dream pop, ethereal indie, ambient pop with vocals.
      Reverb-soaked, washed-out, blurred edges. Use-case: spaced-out moments,
      looking out a window on a journey, gentle dissociation, daydreaming.
      Different from Decompression (which is for recovering from overload —
      Dreamy is for actively floating). Tame Impala, Beach House, Cocteau
      Twins, slowdive-adjacent.
    fits:
      - "psychedelic"
      - "shoegaze"
      - "dream pop"
      - "ethereal"
      - "hazy"
      - "ambient pop"
      - "neo-psychedelia"
      - "chillwave"
    audio_hints:
      tempo: "any"
      energy: "low-medium"
      mood: "floating"
    avoid:
      - "harsh edges"
      - "aggressive vocals"
      - "high-stim percussion"

  - name: "Tender"
    description: >
      Emotionally open, vulnerable, intimate music. Soft acoustic, gentle
      ballads, quiet R&B, whispered vocals. The feeling is "open-hearted" —
      not sad like Melancholy, not warm-and-comforting like Cosy, but
      emotionally exposed. Phoebe Bridgers in restraint mode, slow Frank
      Ocean, Sufjan's quieter work, gentle love songs. Use-case: emotionally
      available moments, processing soft feelings, sitting with someone you
      love. If the song feels like it could make you cry but isn't *trying*
      to, it belongs here.
    fits:
      - "intimate"
      - "vulnerable"
      - "tender"
      - "soft acoustic"
      - "gentle ballad"
      - "slow R&B"
      - "love song"
      - "quiet"
    audio_hints:
      tempo: "60-100 bpm"
      energy: "low"
      mood: "tender"
      vocal: "soft, intimate"
    avoid:
      - "heavy production"
      - "loud dynamics"
      - "ironic distance"

  - name: "Groove"
    description: >
      Mid-tempo, *smooth* danceable music — funk, disco, neo-soul,
      soulful/deep/jazzy house, modern soulful electronic. The kind of song
      that makes you bob your head and shift your weight while doing
      something else. Reference points: Jamiroquai, Disclosure (the soul
      cuts), Jungle, Khruangbin, Roy Ayers, soulful Kaytranada, deep house
      with a vocal hook. Use-case: cooking, getting dressed, light
      activity where you want movement without commitment.

      STRICT exclusion: this is NOT general dance / club / EDM. Peak-time
      bootlegs, edits, hardstyle, donk, bassline, jersey club, hyper rap,
      DJ tools, bass-drop-driven house — all of those go to Club Tools.
      If a track exists primarily to serve a club floor rather than a
      living room, it does NOT belong here.
    fits:
      - "funk"
      - "disco"
      - "soulful house"
      - "deep house"
      - "neo-soul"
      - "groovy"
      - "soulful"
      - "downtempo"
      - "nu-disco"
      - "jazzy house"
    audio_hints:
      tempo: "100-128 bpm"
      energy: "medium"
      danceability: "high"
      vocal: "smooth, often soulful"
    avoid:
      - "anthemic peaks"
      - "bass drops"
      - "peak-time club energy"
      - "bootleg / edit / DJ-tool tracks"
      - "hard EDM / hardstyle / donk / bassline"
      - "non-rhythmic ambient"

  - name: "Late Night"
    description: >
      After-hours music — slow R&B, downtempo electronic, jazzy lounge,
      dim-light vibes. Smoke and amber lighting, not bright sunlight.
      Different from Decompression (which is recovery) and Dreamy
      (which is floating) — Late Night is specifically about the
      time-of-day quality, the sense of intimacy and slowness that
      comes after midnight. The Weeknd's slower work, FKA Twigs,
      Sade, Massive Attack, Bonobo. Use-case: late evening, low lights,
      winding down without going to sleep.
    fits:
      - "downtempo"
      - "trip-hop"
      - "lounge"
      - "smooth jazz"
      - "after hours"
      - "slow R&B"
      - "nocturnal"
      - "moody electronic"
    audio_hints:
      tempo: "60-100 bpm"
      energy: "low"
      mood: "moody"
    avoid:
      - "high energy"
      - "bright/sunny vibes"
      - "morning music"

  - name: "Morning"
    description: >
      Bright but gentle wake-up music — soft folk, mellow indie pop,
      coffee-shop warmth, acoustic mornings. The opposite end of the
      day from Late Night. Not anthemic (Joy) or anxious to start the
      day (Hype) — just kind, sunlit easing-in. José González, Devendra
      Banhart, gentle Norah Jones, mellow Iron & Wine. Use-case: first
      hour awake, slow breakfast, sunrise window light.
    fits:
      - "morning"
      - "acoustic"
      - "soft folk"
      - "mellow indie"
      - "sunrise"
      - "coffee shop"
      - "gentle"
    audio_hints:
      tempo: "70-110 bpm"
      energy: "low-medium"
      mood: "calm and bright"
    avoid:
      - "high energy"
      - "dark or moody"
      - "aggressive"

  - name: "Heartbreak"
    description: >
      Sharp post-loss rawness — devastated breakup tracks, angsty
      reckoning, songs that capture the specific pain of losing someone
      or something. More raw than Melancholy (general sadness), more
      specific than Tender (open vulnerability). Olivia Rodrigo's angsty
      tracks, Adele heavy, Phoebe Bridgers at her most direct, Bon Iver
      at his rawest. Use-case: actively processing a breakup or loss.
    fits:
      - "heartbreak"
      - "breakup"
      - "sad"
      - "devastating"
      - "raw"
      - "emo"
      - "confessional"
    audio_hints:
      tempo: "any"
      energy: "any"
      mood: "raw, sad"
    avoid:
      - "celebratory"
      - "lighthearted"
      - "purely angry without sadness"

  - name: "Cinematic"
    description: >
      Music that makes you feel like the protagonist of a movie —
      dramatic builds, orchestral swells, post-rock peaks, soundtrack
      moments. Hans Zimmer scores, Sigur Rós, Explosions in the Sky,
      Max Richter, Ólafur Arnalds, the climactic moments of post-rock
      tracks. Different from Hype (which is anthemic, not necessarily
      epic) and Curiosity Spark (which is weird, not necessarily
      dramatic). Use-case: walking with headphones and feeling profound,
      narrative emotional arcs.
    fits:
      - "cinematic"
      - "orchestral"
      - "post-rock"
      - "soundtrack"
      - "epic"
      - "neo-classical"
      - "ambient orchestral"
      - "modern classical"
    audio_hints:
      tempo: "any"
      energy: "builds from low to high"
      mood: "epic"
    avoid:
      - "consistently low-stakes"
      - "purely lyrical"
      - "unstructured ambient"

  - name: "Yearning"
    description: >
      Specific feeling of longing — wanting someone, somewhere, something
      you can't quite reach. Different from Melancholy (settled sadness)
      and Tender (open warmth) — Yearning has reach in it, the ache of
      desire. Mitski at her most longing, Phoebe Bridgers reaching, slow
      synth-pop with distance, Lana Del Rey wistful. Use-case: when you
      want to lean into the wanting itself.
    fits:
      - "yearning"
      - "longing"
      - "wistful"
      - "indie folk"
      - "slow synth-pop"
      - "atmospheric"
      - "introspective"
    audio_hints:
      tempo: "60-100 bpm"
      energy: "low-medium"
      mood: "longing"
    avoid:
      - "celebratory"
      - "settled / contentment"
      - "aggressive"

  - name: "Devotional"
    description: >
      Spiritual, transcendent, gospel — music with sacred or sublime
      reach. Black gospel, hymns, devotional electronic, sacred minimalism,
      Sufjan's religious work, Aretha gospel, Arvo Pärt, Hildegard. Doesn't
      have to be religious — just music with that quality of reaching for
      something larger. Use-case: when you want music that aims upward,
      moments of awe or grace.
    fits:
      - "gospel"
      - "spiritual"
      - "sacred"
      - "devotional"
      - "hymn"
      - "sacred minimalism"
      - "transcendent"
      - "choral"
    audio_hints:
      tempo: "any"
      energy: "any"
      mood: "reverent"
    avoid:
      - "ironic"
      - "purely secular party music"
      - "aggressive"

  - name: "Stillness"
    description: >
      Pure ambient, drone, near-silent music for actual meditation or
      deep quiet. No melody, minimal structure, very slow change. Distinct
      from Deep Focus (which has more structure) and Decompression (which
      uses gentle music) — Stillness is for tracks that approach silence
      itself. Brian Eno's quietest work, Stars of the Lid, Eliane Radigue,
      William Basinski, deep drone. Use-case: meditation, breath work,
      sensory deprivation moments.
    fits:
      - "ambient"
      - "drone"
      - "minimalist"
      - "meditation"
      - "silent"
      - "field recording"
      - "isolationist"
    audio_hints:
      tempo: "<60 bpm or beatless"
      energy: "very low"
      mood: "still"
    avoid:
      - "any beat"
      - "melodic hooks"
      - "vocals"

  - name: "Workout"
    description: >
      BPM-locked propulsive music for cardio — running, lifting, gym
      sessions. Different from Hype (anthemic peaks) and Driving
      (mid-tempo motion) — Workout is specifically about sustained
      tempo for sustained effort. Hard EDM, drum & bass, fast hip-hop,
      gym-friendly rock, hard techno. Use-case: actual exercise, where
      you need consistent BPM more than emotional content.
    fits:
      - "workout"
      - "gym"
      - "running"
      - "EDM"
      - "drum and bass"
      - "hard techno"
      - "cardio"
      - "fitness"
    audio_hints:
      tempo: "130-180 bpm"
      energy: "high, sustained"
      danceability: "high"
    avoid:
      - "tempo changes mid-track"
      - "long quiet sections"
      - "ambient"

  - name: "Club Tools"
    description: >
      Peak-time floor-functional dance music — bootlegs, edits, remix-pack
      tracks, niche subgenres built for the DJ booth rather than home
      listening. Donk, bassline, hardstyle, jersey club, hyper rap, UK
      garage edits, hard EDM, jungle bootlegs, big-room drops, tech house
      bombs, hyperpop-rap. Often by obscure / underground producers.
      The defining quality: this song exists to *function* on a club
      floor — energy, drop, tempo lock — rather than to be listened to
      attentively. If a track is anonymous, hard-hitting, and DJ-tool
      shaped, it belongs here.
    fits:
      - "bootleg"
      - "edit"
      - "DJ tool"
      - "donk"
      - "bassline"
      - "hardstyle"
      - "jersey club"
      - "UK garage"
      - "tech house"
      - "big room"
      - "hyperpop rap"
      - "underground EDM"
      - "remix"
    audio_hints:
      tempo: "120-180 bpm"
      energy: "high"
      danceability: "very high"
    avoid:
      - "soulful / smooth (→ Groove)"
      - "anthemic / sing-along (→ Hype)"
      - "calm / ambient"

  - name: "Storytelling"
    description: >
      Lyric-forward folk and singer-songwriter tracks where you LISTEN
      to the words. Bob Dylan, Joni Mitchell, Leonard Cohen, modern
      narrative songwriters. Different from every other playlist
      because the criterion is structural (lyrics carry the weight)
      rather than emotional. The track demands attention to language.
      Use-case: deliberate listening, language-focused mood, train
      journeys with the lyric sheet.
    fits:
      - "singer-songwriter"
      - "narrative"
      - "lyrical"
      - "folk"
